<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --parchment: #f0ebe0;
      --warm-border: #e0d8cc;
      --text-dark: #2c2418;
      --text-mid: #6b5e4e;
      --text-light: #9c8e7e;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--parchment);
      color: var(--text-dark);
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    .page-wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    /* Top bar for "Make your own" */
    .make-own-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 0 4px;
    }
    .make-own-bar a {
      font-size: 13px;
      color: var(--text-light);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
    }
    .make-own-bar a:hover { color: var(--text-mid); }
    .make-own-btn {
      display: inline-block;
      padding: 8px 16px;
      background: #c0623a;
      color: white;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s;
    }
    .make-own-btn:hover { background: #a84f2e; }

    /* Card */
    .nl-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    /* Header */
    .nl-header {
      padding: 40px 48px 32px;
    }
    .nl-title {
      font-family: 'Lora', serif;
      font-size: 30px;
      font-weight: 600;
      line-height: 1.25;
    }
    .nl-subtitle {
      font-size: 16px;
      margin-top: 8px;
      opacity: 0.75;
      line-height: 1.5;
    }
    .nl-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.25);
      font-size: 13px;
    }
    .nl-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }
    .nl-date { margin-left: auto; font-size: 12px; opacity: 0.8; }

    /* Body */
    .nl-body {
      padding: 36px 48px 48px;
    }

    /* Block rendering */
    .view-block { margin-bottom: 20px; }
    .view-block:last-child { margin-bottom: 0; }

    .view-heading {
      font-family: 'Lora', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .view-subheading {
      font-family: 'Lora', serif;
      font-size: 18px;
      font-style: italic;
      font-weight: 600;
      color: var(--text-mid);
      line-height: 1.3;
    }
    .view-text {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-dark);
      white-space: pre-wrap;
    }
    .view-divider {
      border: none;
      border-top: 1px solid var(--warm-border);
      margin: 8px 0;
    }
    .view-image img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }
    .view-caption {
      font-size: 13px;
      color: var(--text-light);
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }
    .view-button {
      padding: 6px 0;
    }
    .view-button a {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .view-button a:hover { opacity: 0.88; }
    .view-spacer { height: 20px; }

    /* Loading / error */
    .state-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 0;
      color: var(--text-light);
      font-size: 15px;
      text-align: center;
    }
    .state-msg-icon { font-size: 40px; }

    /* Footer */
    .nl-footer {
      text-align: center;
      margin-top: 32px;
      color: var(--text-light);
      font-size: 12px;
    }
    .nl-footer a { color: #c0623a; text-decoration: none; }
    .nl-footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .nl-header { padding: 28px 24px 20px; }
      .nl-body { padding: 24px 24px 32px; }
      .nl-title { font-size: 24px; }
      .make-own-bar { flex-direction: column; gap: 10px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="make-own-bar">
    <a href="/">🌿 Newsletter Studio</a>
    <a href="/" class="make-own-btn">Make your own →</a>
  </div>

  <div class="nl-card" id="nlCard">
    <div class="state-msg" id="loadingMsg">
      <div class="state-msg-icon">📬</div>
      <div>Loading newsletter…</div>
    </div>
  </div>

  <div class="nl-footer" id="nlFooter" style="display:none">
    Made with <a href="/">Newsletter Studio</a> 🌿
  </div>
</div>

<script>
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function renderBlock(block, templateData) {
  const div = document.createElement('div');
  div.className = 'view-block';

  if (block.type === 'heading') {
    div.innerHTML = `<div class="view-heading">${block.content || ''}</div>`;
  } else if (block.type === 'subheading') {
    div.innerHTML = `<div class="view-subheading">${block.content || ''}</div>`;
  } else if (block.type === 'text') {
    div.innerHTML = `<div class="view-text">${escHtml(block.content || '')}</div>`;
  } else if (block.type === 'divider') {
    div.innerHTML = `<div class="view-divider"></div>`;
  } else if (block.type === 'image' && block.url) {
    div.innerHTML = `<div class="view-image">
      <img src="${escHtml(block.url)}" alt="" />
      ${block.caption ? `<div class="view-caption">${block.caption}</div>` : ''}
    </div>`;
  } else if (block.type === 'button') {
    const bg = templateData?.bg || '#c0623a';
    const color = templateData?.text || '#fff';
    const label = block.label || 'Click here';
    const url = block.url || '#';
    div.innerHTML = `<div class="view-button">
      <a href="${escHtml(url)}" style="background:${escHtml(bg)};color:${escHtml(color)}" target="_blank" rel="noopener">${label}</a>
    </div>`;
  } else if (block.type === 'spacer') {
    div.innerHTML = `<div class="view-spacer"></div>`;
  } else {
    return null; // skip unknown / empty blocks
  }

  return div;
}

async function loadNewsletter() {
  const id = window.location.pathname.replace('/n/', '');
  const card = document.getElementById('nlCard');

  try {
    const res = await fetch(`/api/newsletters/${id}`);
    if (!res.ok) throw new Error('not found');
    const data = await res.json();

    // Set page title
    const rawTitle = data.title ? data.title.replace(/<[^>]*>/g,'') : 'Newsletter';
    document.title = rawTitle || 'Newsletter';

    // Build header
    const headerHtml = `
      <div class="nl-header" style="background:${escHtml(data.templateData?.bg||'#c8745a')};color:${escHtml(data.templateData?.text||'#fff')}">
        <div class="nl-title">${data.title || ''}</div>
        ${data.subtitle ? `<div class="nl-subtitle">${data.subtitle}</div>` : ''}
        <div class="nl-meta" style="border-top-color:${data.templateData?.text==='#fff'?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.15)'}">
          <div class="nl-avatar">${(data.author||'?').replace(/<[^>]*>/g,'').trim()[0]?.toUpperCase()||'?'}</div>
          <div>${data.author || ''}</div>
          <div class="nl-date">${escHtml(data.date || '')}</div>
        </div>
      </div>`;

    // Build body
    const bodyEl = document.createElement('div');
    bodyEl.className = 'nl-body';
    (data.blocks || []).forEach(block => {
      const el = renderBlock(block, data.templateData);
      if (el) bodyEl.appendChild(el);
    });

    card.innerHTML = headerHtml;
    card.appendChild(bodyEl);
    document.getElementById('nlFooter').style.display = 'block';

  } catch (e) {
    card.innerHTML = `<div class="state-msg">
      <div class="state-msg-icon">🔍</div>
      <div>Newsletter not found.<br>The link may be incorrect or expired.</div>
    </div>`;
  }
}

loadNewsletter();
</script>
</body>
</html>
